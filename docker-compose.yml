# AI Отдел: PostgreSQL + Nest API + единый Next (CRM + /platform)
#
#   cp .env.docker.example .env
#   docker compose up --build
#
# Control Plane: http://localhost:3000/platform/login

name: ai-otdel

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-linearize}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-linearize}
      POSTGRES_DB: ${POSTGRES_DB:-linearize}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-linearize} -d ${POSTGRES_DB:-linearize}']
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "${API_PORT:-3333}:3333"
    environment:
      PORT: '3333'
      DATABASE_URL: ${DATABASE_URL:-postgresql://linearize:linearize@postgres:5432/linearize}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      JWT_SECRET: ${JWT_SECRET:-change-docker-jwt-secret}
      SUPER_ADMIN_KEY: ${SUPER_ADMIN_KEY:-change-me-super-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      USER_PORTAL_PUBLIC_URL: ${USER_PORTAL_PUBLIC_URL:-http://localhost:3000}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL:-}
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3333/v1/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333}
        NEXT_PUBLIC_DEMO_TENANT_ID: ${NEXT_PUBLIC_DEMO_TENANT_ID:-}
        NEXT_PUBLIC_USER_APP_URL: ${NEXT_PUBLIC_USER_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_SUPER_ADMIN_KEY: ${NEXT_PUBLIC_SUPER_ADMIN_KEY:-change-me-super-secret}
        NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-hello@example.com}
        NEXT_PUBLIC_APP_ORIGIN: ${NEXT_PUBLIC_APP_ORIGIN:-http://localhost:3000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      PORT: '3000'

volumes:
  pgdata:
